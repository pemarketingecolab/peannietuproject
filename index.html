<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annie Tu - Digital Transformation Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #3366ff;
            --dark-blue: #020b2d;
            --accent-cyan: #33ccff;
            --accent-yellow: #ffcc00;
            --text-white: #ffffff;
            --stat-green: #33cc99;
            --stat-orange: #ff5555;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Montserrat', 'Noto Sans TC', sans-serif;
            color: var(--text-white); overflow-x: hidden;
            background-color: var(--dark-blue);
        }
        * { box-sizing: border-box; }

        /* ================= 專案主頁面 ================= */
        #page-projects { position: relative; overflow-x: hidden; min-height: 100vh; }
        #bg-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        .projects-container { 
            padding: 80px 10%; display: flex; flex-direction: column; 
            align-items: center; z-index: 2; position: relative; 
            min-height: 100vh; justify-content: center; 
        }
        .projects-container h1 { font-size: 2.5rem; margin-bottom: 50px; text-shadow: 0 0 10px rgba(255,255,255,0.5); font-weight: 800;}
        
        /* 調整格線配置以對應新排版 */
        .grid-cards { 
            display: flex; flex-direction: column; gap: 30px; 
            width: 100%; max-width: 950px; margin-bottom: 20px;
            z-index: 5; position: relative;
        }
        .row-2 {
            display: grid; grid-template-columns: 1fr 1fr; gap: 30px;
        }
        
        .project-card {
            background: rgba(10, 30, 100, 0.45); border: 2px solid #3366ff; border-radius: 20px;
            padding: 25px; display: flex; align-items: center; justify-content: space-between;
            backdrop-filter: blur(15px); transition: transform 0.3s, box-shadow 0.3s, border-color 0.3s; box-shadow: 0 0 20px rgba(51,102,255,0.3);
            position: relative; z-index: 10; cursor: pointer;
        }
        .project-card.full-width {
            width: 100%;
        }
        .project-card:hover { transform: translateY(-5px); border-color: var(--accent-cyan); box-shadow: 0 0 30px rgba(51,204,255,0.5); }
        .card-content { display: flex; align-items: center; gap: 20px; pointer-events: none;}
        .icon-group { display: flex; gap: 15px; align-items: center; } 
        .card-icon { width: 65px; height: 65px; object-fit: contain; }
        .card-title { font-weight: 800; font-size: 1.1rem; line-height: 1.3; color: white; }
        .btn-open { background: white; color: #0033cc; padding: 8px 20px; border-radius: 20px; font-weight: 800; border:none; pointer-events: none;}

        .btn-nav {
            background: #33cc99; color: white; padding: 12px 40px; border-radius: 30px;
            font-size: 1.1rem; font-weight: 800; cursor: pointer; border:none; z-index: 5; margin: 20px 0;
            box-shadow: 0 4px 15px rgba(51, 204, 153, 0.4); transition: transform 0.3s;
        }
        .btn-nav:hover { transform: scale(1.05); }

        /* ================= 彈出視窗總體樣式 ================= */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.85); backdrop-filter: blur(12px);
            display: flex; justify-content: center; align-items: center;
