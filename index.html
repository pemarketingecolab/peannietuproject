<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annie Tu - Digital Transformation Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ================= 總體設定 ================= */
        :root {
            --primary-blue: #0052cc;
            --dark-blue: #020b2d;
            --accent-cyan: #33ccff;
            --accent-yellow: #ffcc00;
            --text-white: #ffffff;
            --stat-green: #33cc99;
            --stat-orange: #ff8c00;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Montserrat', 'Noto Sans TC', sans-serif;
            color: var(--text-white); background-color: var(--dark-blue);
        }
        * { box-sizing: border-box; }

        /* ================= Canva 嵌入全螢幕設定 ================= */
        .canva-frame {
            width: 100%;
            height: 100vh; /* 佔滿整個螢幕高度 */
            border: none;
            display: block;
        }

        /* ================= 中間段: GitHub 專案卡片區塊 ================= */
        .projects-section {
            position: relative;
            padding: 120px 10%;
            background-color: var(--dark-blue);
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow: hidden;
        }
        
        /* 輕微的星空背景修飾（若無影片亦好看） */
        .projects-section::before {
            content: ''; position: absolute; top:0; left:0; width:100%; height:100%;
            background: radial-gradient(circle at 50% 50%, rgba(20, 40, 120, 0.3), transparent);
            z-index: 0; pointer-events: none;
        }

        .projects-section h1 { 
            font-size: 2.5rem; margin-bottom: 50px; 
            text-shadow: 0 0 10px rgba(255,255,255,0.5); font-weight: 800;
            z-index: 1; position: relative; text-align: center;
        }
        
        .grid-cards { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 30px; 
            width: 100%; max-width: 950px; z-index: 1; position: relative;
        }
        
        @media (max-width: 768px) {
            .grid-cards { grid-template-columns: 1fr; }
        }

        .project-card {
            background: rgba(10, 30, 100, 0.4);
            border: 2px solid #3366ff; border-radius: 20px;
            padding: 25px; display: flex; align-items: center; justify-content: space-between;
            backdrop-filter: blur(15px); transition: 0.3s; box-shadow: 0 0 20px rgba(51,102,255,0.3);
        }
        .project-card:hover { transform: translateY(-5px); border-color: var(--accent-cyan); box-shadow: 0 0 30px rgba(51,204,255,0.5); }
        .card-content { display: flex; align-items: center; gap: 20px; }
        .card-icon { width: 70px; height: 70px; object-fit: contain; }
        .card-title { font-weight: 800; font-size: 1.1rem; line-height: 1.3; }
        .btn-open { background: white; color: #0033cc; padding: 8px 20px; border-radius: 20px; font-weight: 800; cursor: pointer; border:none;}

        /* ================= 彈出視窗樣式 ================= */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
        .modal-box {
            background: linear-gradient(135deg, #05103a, #0a1e64);
            border: 2px solid #3366ff; border-radius: 30px;
            width: 850px; max-width: 95%; padding: 50px; position: relative;
            transform: scale(0.9); transition: 0.3s; box-shadow: 0 0 50px rgba(51,102,255,0.4);
        }
        .modal-overlay.show .modal-box { transform: scale(1); }
        .btn-close { position: absolute; top: 20px; right: 20px; background: #3366ff; color: white; width: 35px; height: 35px; border-radius: 50%; border:none; font-weight: bold; cursor:pointer; }
        
        .modal-header-title { font-size: 1.8rem; font-weight: 800; margin-bottom: 30px; color: white; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px;}
        .modal-body { display: flex; gap: 40px; }
        .modal-left { flex: 1; }
        .modal-right { flex: 1.2; display: grid; grid-template-columns: 1fr 1fr; gap: 15px; align-content: start;}

        /* 進度圈 */
        .progress-circle {
            width: 150px; height: 150px; border-radius: 50%;
            background: conic-gradient(#3366ff var(--p), #1a2a5a 0);
            display: flex; justify-content: center; align-items: center; margin: 0 auto 20px; position: relative;
        }
        .progress-circle::before { content: ''; position: absolute; width: 120px; height: 120px; background: #05103a; border-radius: 50%; }
        .progress-value { position: relative; font-size: 2.5rem; font-weight: 800; }

        /* Canva 風格數據標籤 */
        .stat-tag {
            background: rgba(255,255,255,0.05); border-radius: 15px; padding: 15px; border: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; align-items: center;
        }
        .stat-label { font-size: 0.75rem; color: #aaa; margin-bottom: 5px; text-transform: uppercase; }
        .stat-value { font-size: 1.4rem; font-weight: 800; color: var(--stat-green); display: flex; align-items: center; gap: 5px;}
        .stat-value.orange { color: var(--stat-orange); }
        
        /* 純白色箭頭設定 */
        .arrow-up { width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-bottom: 12px solid #ffffff; }
        .arrow-down { width: 0; height: 0; border-left: 8px solid transparent; border-right: 8px solid transparent; border-top: 12px solid #ffffff; }

        .target-box { background: rgba(51, 102, 255, 0.2); border-radius: 10px; padding: 10px; text-align: center; margin-bottom: 20px;}
        .target-date { color: var(--accent-yellow); font-weight: 800; font-size: 1.1rem; }
    </style>
</head>

    </div>
