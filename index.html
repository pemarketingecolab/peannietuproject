<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Annie Tu - Digital Transformation Projects</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800&family=Noto+Sans+TC:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* ================= 總體設定 ================= */
        :root {
            --primary-blue: #0052cc;
            --dark-blue: #020b2d; /* 更深的深藍色以匹配 Canva */
            --accent-cyan: #33ccff;
            --accent-yellow: #ffcc00;
            --text-white: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --stat-green: #33cc99;
            --stat-orange: #ff8c00;
        }
        body, html {
            margin: 0; padding: 0; width: 100%; height: 100%;
            font-family: 'Montserrat', 'Noto Sans TC', sans-serif;
            color: var(--text-white); overflow-x: hidden;
            background-color: var(--dark-blue);
        }
        * { box-sizing: border-box; }
        
        .page {
            display: none; width: 100%; min-height: 100vh;
            position: absolute; top: 0; left: 0;
            animation: fadeIn 0.5s ease-in-out;
            background-size: cover; background-position: center;
        }
        .page.active { display: block; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* 裝飾性星星與 Logo */
        .ecolab-logo { position: absolute; top: 30px; left: 40px; width: 150px; z-index: 10; }
        
        /* ================= 專案卡片樣式升級 ================= */
        #page-projects { position: relative; overflow: hidden; }
        #bg-video { position: absolute; top: 0; left: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
        .projects-container { padding: 100px 10%; display: flex; flex-direction: column; align-items: center; z-index: 2; position: relative; min-height: 100vh; justify-content: center; }
        .projects-container h1 { font-size: 2.5rem; margin-bottom: 50px; text-shadow: 0 0 10px rgba(255,255,255,0.5); font-weight: 800;}
        
        .grid-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 30px; width: 100%; max-width: 950px; }
        .project-card {
            background: rgba(10, 30, 100, 0.4);
            border: 2px solid #3366ff; border-radius: 20px;
            padding: 25px; display: flex; align-items: center; justify-content: space-between;
            backdrop-filter: blur(15px); transition: 0.3s; box-shadow: 0 0 20px rgba(51,102,255,0.3);
        }
        .project-card:hover { transform: scale(1.02); border-color: var(--accent-cyan); box-shadow: 0 0 30px rgba(51,204,255,0.5); }
        .card-content { display: flex; align-items: center; gap: 20px; }
        .card-icon { width: 70px; height: 70px; object-fit: contain; }
        .card-title { font-weight: 800; font-size: 1.1rem; line-height: 1.3; }
        .btn-open { background: white; color: #0033cc; padding: 8px 20px; border-radius: 20px; font-weight: 800; cursor: pointer; border:none;}

        /* ================= 彈出視窗樣式升級 ================= */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(8px);
            display: flex; justify-content: center; align-items: center;
            z-index: 9999; opacity: 0; pointer-events: none; transition: 0.3s;
        }
        .modal-overlay.show { opacity: 1; pointer-events: auto; }
